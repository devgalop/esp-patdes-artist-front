<app-page-header title="Reschedule Event" subtitle="Pick a new date for this event" />

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>New Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="newDate" />
        <mat-datepicker-toggle matIconSuffix [for]="picker" />
        <mat-datepicker #picker />
        @if (form.get('newDate')?.hasError('required') && form.get('newDate')?.touched) {
          <mat-error>Date is required</mat-error>
        }
        @if (form.get('newDate')?.hasError('pastDate') && form.get('newDate')?.touched) {
          <mat-error>Date must be in the future</mat-error>
        }
      </mat-form-field>

      <div style="display:flex; gap:12px; margin-top:16px;">
        <a mat-stroked-button [routerLink]="['/events', id()]">Cancel</a>
        <button mat-flat-button color="primary" type="submit">Confirm Reschedule</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
