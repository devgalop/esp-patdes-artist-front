<app-page-header title="Cultural Events" subtitle="Manage and browse all events" />

<div class="list-actions">
  <a mat-flat-button color="primary" routerLink="/events/create">
    <mat-icon>add</mat-icon>
    New Event
  </a>
</div>

<app-data-table
  [columns]="columns"
  [data]="events()"
  emptyMessage="No events found. Create your first event!"
  (rowClick)="onRowClick($event)" />

<mat-paginator
  [length]="totalCount()"
  [pageSize]="pageSize()"
  [pageIndex]="pageNumber() - 1"
  [pageSizeOptions]="[5, 10, 25]"
  (page)="onPageChange($event)"
  aria-label="Events pagination" />
